name: Export Playwright ARM64 Docker image

on:
  workflow_dispatch:

jobs:
  export-image:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull ARM64 Playwright image
        run: |
          docker pull --platform linux/arm64 mcr.microsoft.com/playwright:v1.61.0-noble

      - name: Save image to tar
        run: |
          docker save mcr.microsoft.com/playwright:v1.61.0-noble -o playwright-v1.61.0-noble-arm64.tar

      - name: Compress tar file
        run: |
          gzip playwright-v1.61.0-noble-arm64.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: playwright-v1.61.0-noble-arm64
          path: playwright-v1.61.0-noble-arm64.tar.gz
